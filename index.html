<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İman Power FC | Next-Gen Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.5);
            --text: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        /* --- MODERN AUTH --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111827 0%, #020617 100%);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .auth-card {
            background: var(--glass); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px;
            border: 1px solid var(--accent); backdrop-filter: blur(20px); text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* --- HEADER --- */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(16, 185, 129, 0.1); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; }
        nav ul { display: flex; list-style: none; gap: 10px; }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.75rem; padding: 10px 15px; border-radius: 12px; transition: 0.4s; border: 1px solid transparent; }
        nav a:hover, nav a.active { color: var(--accent); border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }

        /* --- SECTIONS --- */
        section { padding: 140px 2rem 80px; max-width: 1400px; margin: 0 auto; display: none; min-height: 100vh; }
        section.active { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .title { font-family: 'Orbitron'; font-size: 2.5rem; text-align: center; margin-bottom: 4rem; letter-spacing: 4px; }
        .title span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        /* --- ULTRA MODERN HOME --- */
        .hero { height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero img { width: 220px; height: 220px; border-radius: 50%; border: 5px solid var(--accent); box-shadow: 0 0 60px var(--accent-glow); margin-bottom: 30px; animation: pulse 3s infinite; }
        .hero h1 { font-family: 'Orbitron'; font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.2rem; color: #94a3b8; font-style: italic; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- PITCH & KADRO --- */
        .pitch {
            width: 100%; max-width: 500px; height: 700px; background: #064e3b; margin: 0 auto;
            border: 5px solid rgba(255,255,255,0.2); border-radius: 15px; position: relative;
            background-image: repeating-linear-gradient(0deg, #064e3b, #064e3b 70px, #065f46 70px, #065f46 140px);
        }
        .player { position: absolute; transform: translate(-50%, -50%); text-align: center; }
        .shirt { width: 55px; height: 55px; background: var(--accent); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.3rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .p-info { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; border: 1.5px solid var(--accent); font-weight: 700; white-space: nowrap; }

        /* --- TRANSFER & NEWS CARDS --- */
        .grid-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .modern-card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-done { background: #059669; } .status-wait { background: #d97706; } .status-cancel { background: #dc2626; }

        /* --- ADMIN --- */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1e293b; background: #020617; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--accent-dark); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <img src="logo.png" style="width:80px; margin-bottom:20px;">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px; color:var(--accent);">GİRİŞ YAP</h2>
            <input type="text" id="user-name" placeholder="Kullanıcı Adı">
            <input type="password" id="user-pass" placeholder="Şifre">
            <button class="btn" onclick="processAuth()">SİSTEME BAĞLAN</button>
            <p style="margin-top:20px; font-size:0.8rem; cursor:pointer;" onclick="toggleAuthMode()">Kayıt Ol</p>
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo-box" style="display:flex; align-items:center; gap:10px; font-family:'Orbitron'; color:var(--accent); font-weight:900;">
                <img src="logo.png" style="width:35px; border-radius:50%;"> IMAN POWER
            </div>
            <nav><ul>
                <li><a href="#" class="nav-link active" onclick="switchPage('home')">ANA SAYFA</a></li>
                <li><a href="#" class="nav-link" onclick="switchPage('kadro')">KADRO</a></li>
                <li><a href="#" class="nav-link" onclick="switchPage('transfer')">TRANSFER</a></li>
                <li><a href="#" class="nav-link" onclick="switchPage('duyurular')">DUYURULAR</a></li>
                <li><a href="#" class="nav-link" onclick="switchPage('admin')">ADMIN</a></li>
            </ul></nav>
        </div>
    </header>

    <section id="home" class="active">
        <div class="hero">
            <img src="logo.png">
            <h1>Berat Cihad YETEN</h1>
            <p>"Zafere giden yolda inanç, en büyük güçtür."</p>
        </div>
    </section>

    <section id="kadro">
        <h2 class="title">ELİT <span>KADRO</span></h2>
        <div class="pitch" id="main-pitch"></div>
    </section>

    <section id="transfer">
        <h2 class="title">TRANSFER <span>MERKEZİ</span></h2>
        <div id="transfer-list" class="grid-box"></div>
    </section>

    <section id="duyurular">
        <h2 class="title">SON <span>HABERLER</span></h2>
        <div id="news-list" class="grid-box"></div>
    </section>

    <section id="admin">
        <h2 class="title">KONTROL <span>PANELİ</span></h2>
        <div id="admin-login" class="auth-card" style="margin:0 auto;">
            <input type="password" id="admin-password" placeholder="Admin Anahtarı">
            <button class="btn" onclick="accessAdmin()">YÖNETİCİ GİRİŞİ</button>
        </div>
        <div id="admin-dashboard" style="display:none;">
            <div class="admin-grid">
                <div class="modern-card">
                    <h3>TRANSFER EKLE</h3>
                    <input type="text" id="tr-name" placeholder="Oyuncu Adı">
                    <select id="tr-status">
                        <option value="done">BİTTİ (ALINDI)</option>
                        <option value="wait">GÖRÜŞÜLÜYOR</option>
                        <option value="cancel">İPTAL EDİLDİ</option>
                    </select>
                    <button class="btn" onclick="addTransfer()">EKLE</button>
                </div>
                <div class="modern-card">
                    <h3>DUYURU YAYINLA</h3>
                    <input type="text" id="nw-title" placeholder="Haber Başlığı">
                    <textarea id="nw-body" placeholder="Haber İçeriği"></textarea>
                    <button class="btn" style="background:#3b82f6" onclick="addNews()">YAYINLA</button>
                </div>
                <div class="modern-card">
                    <h3>KADRO GÜNCELLE</h3>
                    <input type="text" id="pl-name" placeholder="İsim">
                    <input type="number" id="pl-num" placeholder="No">
                    <select id="pl-pos"><option value="GK">Kaleci</option><option value="ST">Santrafor</option><option value="CM">Orta Saha</option><option value="CB">Stoper</option></select>
                    <button class="btn" style="background:#8b5cf6" onclick="updateSquad()">KADROYA YAZ</button>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy4ZUv_wZsntWSIDbcOlvpqDTBvWuSdrk",
            authDomain: "imanpowerveri.firebaseapp.com",
            databaseURL: "https://imanpowerveri-default-rtdb.firebaseio.com",
            projectId: "imanpowerveri",
            storageBucket: "imanpowerveri.firebasestorage.app",
            messagingSenderId: "891464029314",
            appId: "1:891464029314:web:581bd3b2ed3d7c6af2d09b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let activeUser = "";

        // AUTH & NAV
        window.processAuth = () => {
            const name = document.getElementById('user-name').value;
            if(name) { activeUser = name; document.getElementById('auth-overlay').style.display='none'; }
        };

        window.switchPage = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        };

        window.accessAdmin = () => {
            if(document.getElementById('admin-password').value === "imanpower2026") {
                document.getElementById('admin-login').style.display='none';
                document.getElementById('admin-dashboard').style.display='block';
            }
        };

        // DATABASE ACTIONS
        window.addTransfer = () => {
            push(ref(db, 'transfers'), { name: document.getElementById('tr-name').value, status: document.getElementById('tr-status').value });
        };
        window.addNews = () => {
            push(ref(db, 'news'), { title: document.getElementById('nw-title').value, body: document.getElementById('nw-body').value, date: new Date().toLocaleDateString() });
        };
        window.updateSquad = () => {
            const p = { name: document.getElementById('pl-name').value, num: document.getElementById('pl-num').value, pos: document.getElementById('pl-pos').value };
            set(ref(db, 'kadro/' + p.pos), p);
        };

        // REALTIME SYNC
        const posMap = { "GK": {t:"88%", l:"50%"}, "CB": {t:"70%", l:"50%"}, "CM": {t:"45%", l:"50%"}, "ST": {t:"18%", l:"50%"} };

        onValue(ref(db, '/'), (snap) => {
            const d = snap.val() || {};
            
            // Render Squad
            const pitch = document.getElementById('main-pitch'); pitch.innerHTML = "";
            if(d.kadro) Object.values(d.kadro).forEach(p => {
                const el = document.createElement('div'); el.className = "player";
                el.style.top = posMap[p.pos].t; el.style.left = posMap[p.pos].l;
                el.innerHTML = `<div class="shirt">${p.num}</div><div class="p-info">${p.name}</div>`;
                pitch.appendChild(el);
            });

            // Render Transfers
            const trBox = document.getElementById('transfer-list'); trBox.innerHTML = "";
            if(d.transfers) Object.entries(d.transfers).forEach(([id, t]) => {
                const statusTxt = t.status === 'done' ? 'ALINDI' : (t.status === 'wait' ? 'BEKLEMEDE' : 'İPTAL');
                trBox.innerHTML += `<div class="modern-card">
                    <span class="status-badge status-${t.status}">${statusTxt}</span>
                    <h3 style="margin-top:10px;">${t.name}</h3>
                    <p style="font-size:0.8rem; color:#64748b;">Transfer Durumu Güncel</p>
                </div>`;
            });

            // Render News
            const nwBox = document.getElementById('news-list'); nwBox.innerHTML = "";
            if(d.news) Object.values(d.news).forEach(n => {
                nwBox.innerHTML += `<div class="modern-card">
                    <small style="color:var(--accent)">${n.date}</small>
                    <h3 style="margin:10px 0;">${n.title}</h3>
                    <p style="font-size:0.9rem; color:#94a3b8;">${n.body}</p>
                </div>`;
            });
        });
    </script>
</body>
</html>
