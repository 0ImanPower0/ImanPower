<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İman Power FC | Kontrol Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.95);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.5);
            --text: #f8fafc;
            --border: rgba(16, 185, 129, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- AUTH SCREEN (SADE) --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--glass); padding: 40px; border-radius: 30px; border: 2px solid var(--accent); text-align: center; width: 90%; max-width: 400px; }

        /* --- HEADER --- */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; }
        .logo-box { display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; font-weight: 900; color: var(--accent); cursor: pointer; }
        .logo-box img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }
        nav ul { display: flex; list-style: none; gap: 5px; }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.7rem; padding: 10px 12px; border-radius: 10px; transition: 0.3s; }
        nav a:hover, nav a.active { background: rgba(16, 185, 129, 0.2); color: var(--accent); }

        /* --- ANA MENÜ (İSTEDİĞİN ÖZEL ALAN) --- */
        #home-content { text-align: center; padding-top: 50px; animation: slideUp 0.8s ease; }
        #home-content img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid var(--accent); box-shadow: 0 0 40px var(--accent-glow); margin-bottom: 20px; }
        #home-content h1 { font-family: 'Orbitron'; font-size: 3.5rem; color: #fff; margin-bottom: 10px; }
        #home-content .founder { font-size: 1.2rem; color: var(--accent); font-weight: 800; letter-spacing: 4px; margin-bottom: 20px; }
        #home-content .motto { font-style: italic; font-size: 1.4rem; color: #94a3b8; max-width: 600px; margin: 0 auto; }

        /* --- SECTIONS --- */
        section { padding: 140px 2rem 60px; max-width: 1300px; margin: 0 auto; display: none; min-height: 100vh; }
        section.active { display: block; }
        .title { font-family: 'Orbitron'; font-size: 2.2rem; text-align: center; margin-bottom: 2rem; color: var(--accent); }

        /* --- CANLI SOHBET & SAHA --- */
        .chat-area { height: 500px; background: var(--glass); border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 15px; border-left: 3px solid var(--accent); }
        .pitch { width: 100%; max-width: 450px; height: 650px; background: #064e3b; margin: 0 auto; border: 4px solid #fff; border-radius: 15px; position: relative; background-image: repeating-linear-gradient(0deg, #064e3b, #064e3b 60px, #065f46 60px, #065f46 120px); }
        .player { position: absolute; transform: translate(-50%, -50%); text-align: center; }
        .shirt { width: 50px; height: 50px; background: var(--accent); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .p-name { background: #000; font-size: 0.75rem; padding: 4px 10px; border-radius: 10px; margin-top: 5px; border: 1px solid var(--accent); font-weight: bold; }

        /* --- FORM & ADMIN --- */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #1e293b; background: #0f172a; color: white; }
        .btn { padding: 14px; border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer; background: var(--accent); width: 100%; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom:20px; font-family:'Orbitron';">SİSTEME GİRİŞ</h2>
            <input type="text" id="u-in" placeholder="Kullanıcı Adı">
            <input type="password" id="p-in" placeholder="Şifre">
            <button class="btn" onclick="login()">GİRİŞ YAP</button>
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo-box" onclick="nav('home')"><img src="logo.png"><span>İMAN POWER</span></div>
            <nav><ul>
                <li><a href="#" onclick="nav('home')" class="n-l active">ANA SAYFA</a></li>
                <li><a href="#" onclick="nav('kadro')" class="n-l">KADRO</a></li>
                <li><a href="#" onclick="nav('sohbet')" class="n-l">SOHBET</a></li>
                <li><a href="#" onclick="nav('admin')" class="n-l">ADMİN</a></li>
            </ul></nav>
        </div>
    </header>

    <section id="home" class="active">
        <div id="home-content">
            <img src="logo.png" alt="Logo">
            <h1>BERAT CİHAD YETEN</h1>
            <div class="founder">KURUCU & BAŞKAN</div>
            <p class="motto">"Sahada İman, Kalpte Güç, Hedef Şampiyonluk!"</p>
        </div>
    </section>

    <section id="kadro">
        <h2 class="title">SAHA DİZİLİMİ</h2>
        <div class="pitch" id="saha"></div>
    </section>

    <section id="sohbet">
        <h2 class="title">CANLI TRİBÜN</h2>
        <div class="chat-area">
            <div id="chat-msgs"></div>
            <div style="display:flex; padding:15px; gap:10px; background:rgba(0,0,0,0.3);">
                <input type="text" id="m-in" placeholder="Mesaj yaz..." style="margin:0;">
                <button class="btn" style="width:100px;" onclick="send()">GÖNDER</button>
            </div>
        </div>
    </section>

    <section id="admin">
        <h2 class="title">YÖNETİCİ PANELİ</h2>
        <div id="adm-lock" class="auth-card" style="margin: 0 auto;">
            <input type="password" id="adm-k" placeholder="Admin Şifresi">
            <button class="btn" onclick="openAdm()">YETKİ AL</button>
        </div>
        <div id="adm-box" style="display:none;">
            <div style="background:var(--glass); padding:20px; border-radius:20px; border:1px solid var(--border);">
                <h3>OYUNCU EKLE</h3>
                <input type="text" id="a-n" placeholder="Oyuncu Tam Adı">
                <input type="number" id="a-no" placeholder="Forma Numarası">
                <select id="a-p">
                    <option value="GK">Kaleci</option>
                    <option value="CB">Stoper</option>
                    <option value="CM">Orta Saha</option>
                    <option value="ST">Forvet</option>
                </select>
                <button class="btn" onclick="addPlayer()">KADROYA EKLE</button>
                <div id="status-list" style="margin-top:20px;"></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy4ZUv_wZsntWSIDbcOlvpqDTBvWuSdrk",
            authDomain: "imanpowerveri.firebaseapp.com",
            databaseURL: "https://imanpowerveri-default-rtdb.firebaseio.com",
            projectId: "imanpowerveri",
            storageBucket: "imanpowerveri.firebasestorage.app",
            messagingSenderId: "891464029314",
            appId: "1:891464029314:web:581bd3b2ed3d7c6af2d09b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let user = "";

        // NAV & AUTH
        window.nav = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-l').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(event) event.target.classList.add('active');
        };

        window.login = () => {
            const u = document.getElementById('u-in').value;
            const p = document.getElementById('p-in').value;
            if(u && p) { user = u; document.getElementById('auth-screen').style.display='none'; }
        };

        window.openAdm = () => {
            if(document.getElementById('adm-k').value === "imanpower2026") {
                document.getElementById('adm-lock').style.display='none';
                document.getElementById('adm-box').style.display='block';
            }
        };

        // DATA ACTIONS
        window.addPlayer = () => {
            const name = document.getElementById('a-n').value;
            const num = document.getElementById('a-no').value;
            const pos = document.getElementById('a-p').value;
            if(!name || !num) return alert("İsim ve Numara yaz!");
            set(ref(db, 'kadro/' + pos), { name, num, pos }).then(() => alert("Oyuncu Sahaya İndi!"));
        };

        window.send = () => {
            const msg = document.getElementById('m-in').value;
            if(msg) { push(ref(db, 'chat'), { u: user, m: msg }); document.getElementById('m-in').value=''; }
        };

        // REAL-TIME
        const pLoc = { GK:{t:'85%',l:'50%'}, CB:{t:'65%',l:'50%'}, CM:{t:'40%',l:'50%'}, ST:{t:'15%',l:'50%'} };
        
        onValue(ref(db, '/'), (snap) => {
            const data = snap.val() || {};
            
            // Chat
            const cBox = document.getElementById('chat-msgs');
            cBox.innerHTML = "";
            if(data.chat) Object.values(data.chat).forEach(m => {
                cBox.innerHTML += `<div class="msg"><b>${m.u}:</b> ${m.m}</div>`;
            });
            cBox.scrollTop = cBox.scrollHeight;

            // Saha
            const saha = document.getElementById('saha');
            saha.innerHTML = "";
            if(data.kadro) Object.values(data.kadro).forEach(p => {
                saha.innerHTML += `<div class="player" style="top:${pLoc[p.pos].t}; left:${pLoc[p.pos].l}">
                    <div class="shirt">${p.num}</div>
                    <div class="p-name">${p.name}</div>
                </div>`;
            });
        });
    </script>
</body>
</html>
