<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İmanPower</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#2563eb44,transparent 40%),
radial-gradient(circle at bottom,#dc262644,transparent 40%);
z-index:-1;
}

.hidden{
display:none;
}

.auth{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.authbox{
width:430px;
background:#0f172a;
padding:35px;
border-radius:30px;
text-align:center;
}

.logo{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
border:4px solid #2563eb;
}

input,select{
width:100%;
padding:15px;
margin-top:12px;
background:#111827;
border:none;
border-radius:15px;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
color:white;
font-weight:700;
cursor:pointer;
}

.dashboard{
display:none;
padding:25px;
}

.topbar{
background:#0f172a;
padding:20px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:35px;
border-radius:25px;
font-size:22px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
background:#172554;
}

.page{
display:none;
margin-top:30px;
background:#0f172a;
padding:30px;
border-radius:30px;
}

#adminFloating{
position:fixed;
right:25px;
bottom:25px;
width:75px;
height:75px;
border-radius:50%;
background:linear-gradient(135deg,#facc15,#eab308);
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
cursor:pointer;
box-shadow:0 0 30px rgba(250,204,21,.6);
z-index:999;
}

.player{
background:#111827;
padding:15px;
border-radius:15px;
text-align:center;
min-width:150px;
position:relative;
}

.deleteBtn{
position:absolute;
top:5px;
right:5px;
background:red;
width:auto;
padding:4px 10px;
}

#footballField{
background:linear-gradient(#15803d,#166534);
padding:30px;
border-radius:30px;
margin-top:20px;
min-height:700px;
}

.positionRow{
display:flex;
justify-content:center;
gap:20px;
margin:45px 0;
flex-wrap:wrap;
}

canvas{
background:#15803d;
border-radius:20px;
margin-top:20px;
width:100%;
max-width:900px;
border:5px solid white;
}

.mobileControls{
display:flex;
gap:10px;
justify-content:center;
margin-top:20px;
flex-wrap:wrap;
}

.mobileControls button{
width:70px;
height:70px;
font-size:28px;
}

@media(max-width:700px){
.menu{
grid-template-columns:1fr;
}

.logo{
width:120px;
height:120px;
}
}
</style>
</head>

<body>

<div class="auth" id="authPage">
<div class="authbox">

<img src="logo.png" class="logo">

<h1>İmanPower</h1>

<div id="loginBox">
<input id="loginUser" placeholder="Kullanıcı Adı">
<input type="password" id="loginPass" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
<button onclick="showRegister()">Kayıt Ol</button>
</div>

<div id="registerBox" class="hidden">
<input id="registerUser" placeholder="Yeni Kullanıcı Adı">
<input type="password" id="registerPass" placeholder="Yeni Şifre">
<button onclick="register()">Kayıt Ol</button>
<button onclick="showLogin()">Geri</button>
</div>

</div>
</div>

<div class="dashboard" id="dashboard">

<div class="topbar">

<div style="display:flex;align-items:center;gap:15px;">
<img src="logo.png" style="width:70px;height:70px;border-radius:50%;">
<div>
<h2>İmanPower</h2>
<p id="welcomeText"></p>
</div>
</div>

<button onclick="logout()" style="width:auto;padding:12px 20px;">Çıkış</button>

</div>

<div class="menu">
<div class="card" onclick="openPage('about')">📖 Hakkımızda</div>
<div class="card" onclick="openPage('academy')">🔥 Altyapı</div>
<div class="card" onclick="openPage('squad')">🛡️ Kadromuz</div>
<div class="card" onclick="openPage('game')">⚽ Oyun</div>
<div class="card" onclick="openPage('chat')">💬 Sohbet</div>
</div>

<div class="page" id="about">
<h1>Hakkımızda</h1>
</div>

<div class="page" id="academy">
<h1>Altyapı</h1>
</div>

<div class="page" id="chat">
<h1>Sohbet</h1>
</div>

<div class="page" id="squad">

<h1>Kadro Dizilişi</h1>

<div id="footballField">

<div class="positionRow" id="forvetler"></div>
<div class="positionRow" id="ortasaha"></div>
<div class="positionRow" id="stoperler"></div>
<div class="positionRow" id="kaleciler"></div>

</div>

</div>

<div class="page" id="game">

<h1>⚽ Futbol Arenası</h1>

<h2>Skor: <span id="score">0</span></h2>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<div class="mobileControls">
<button onclick="movePlayer('up')">⬆️</button>
<button onclick="movePlayer('left')">⬅️</button>
<button onclick="movePlayer('down')">⬇️</button>
<button onclick="movePlayer('right')">➡️</button>
</div>

</div>

<div class="page" id="admin">

<h1>👑 Admin Paneli</h1>

<input id="adminCode" placeholder="Admin Şifresi">

<button onclick="checkAdmin()">Giriş</button>

<div id="adminArea" class="hidden">

<h2>Kullanıcılar</h2>
<div id="usersList"></div>

</div>

</div>

<div id="adminFloating" onclick="openPage('admin')">
👑
</div>

</div>

<script>
function showRegister(){
document.getElementById('loginBox').classList.add('hidden');
document.getElementById('registerBox').classList.remove('hidden');
}

function showLogin(){
document.getElementById('registerBox').classList.add('hidden');
document.getElementById('loginBox').classList.remove('hidden');
}

function register(){
const u=document.getElementById('registerUser').value;
const p=document.getElementById('registerPass').value;

localStorage.setItem('user_'+u,p);

alert('Kayıt başarılı');
showLogin();
}

function login(){
const u=document.getElementById('loginUser').value;
const p=document.getElementById('loginPass').value;

if(localStorage.getItem('user_'+u)===p){

document.getElementById('authPage').style.display='none';
document.getElementById('dashboard').style.display='block';

document.getElementById('welcomeText').innerText='Hoş geldin '+u;

}else{
alert('Hatalı giriş');
}
}

function logout(){
location.reload();
}

function openPage(id){

document.querySelectorAll('.page').forEach(p=>{
p.style.display='none';
});

document.getElementById(id).style.display='block';
}

function checkAdmin(){

if(document.getElementById('adminCode').value==='imanpoweradmini31'){

document.getElementById('adminArea').classList.remove('hidden');

const users=document.getElementById('usersList');

users.innerHTML='';

for(let i=0;i<localStorage.length;i++){

const key=localStorage.key(i);

if(key.startsWith('user_')){

const div=document.createElement('div');

div.className='player';

div.innerHTML=key.replace('user_','');

users.appendChild(div);

}
}

}else{
alert('Yanlış şifre');
}
}

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

let player={x:100,y:250,w:40,h:40};
let ball={x:450,y:250,r:20,vx:0,vy:0};
let score=0;

function movePlayer(dir){
if(dir==='up') player.y-=20;
if(dir==='down') player.y+=20;
if(dir==='left') player.x-=20;
if(dir==='right') player.x+=20;
}

document.addEventListener('keydown',e=>{

if(e.key==='w') player.y-=15;
if(e.key==='s') player.y+=15;
if(e.key==='a') player.x-=15;
if(e.key==='d') player.x+=15;

});

function gameLoop(){

ctx.clearRect(0,0,900,500);

ctx.fillStyle='#15803d';
ctx.fillRect(0,0,900,500);

ctx.strokeStyle='white';
ctx.lineWidth=4;
ctx.strokeRect(0,0,900,500);

ctx.fillStyle='white';
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fillStyle='orange';
ctx.fill();

let dx=player.x-ball.x;
let dy=player.y-ball.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<50){
ball.vx=8;
}

ball.x+=ball.vx;
ball.vx*=0.98;

if(ball.x>860){
score++;
document.getElementById('score').innerText=score;
ball.x=450;
ball.y=250;
}

requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
