<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İman Power FC | Pro Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.9);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- HEADER & NAV --- */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; }
        .logo-box { display: flex; align-items: center; gap: 15px; font-family: 'Orbitron'; font-weight: 900; color: var(--accent); cursor: pointer; }
        .logo-box img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        
        nav ul { display: flex; list-style: none; gap: 5px; }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.7rem; padding: 12px 16px; border-radius: 10px; transition: 0.3s; text-transform: uppercase; }
        nav a:hover, nav a.active { background: rgba(16, 185, 129, 0.1); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* --- SECTIONS --- */
        section { padding: 120px 2rem 60px; max-width: 1300px; margin: 0 auto; display: none; min-height: 100vh; }
        section.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .title { font-family: 'Orbitron'; font-size: 2.5rem; text-align: center; margin-bottom: 3.5rem; letter-spacing: 4px; }
        .title span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        /* --- HERO --- */
        .hero { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-family: 'Orbitron'; font-size: 3.5rem; margin-bottom: 15px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.2rem; color: #64748b; font-weight: 300; }

        /* --- PITCH & KADRO --- */
        .pitch {
            width: 100%; max-width: 480px; height: 680px; background: #064e3b; margin: 0 auto;
            border: 5px solid rgba(255,255,255,0.15); border-radius: 20px; position: relative;
            background-image: repeating-linear-gradient(0deg, #064e3b, #064e3b 60px, #065f46 60px, #065f46 120px);
        }
        .player { position: absolute; transform: translate(-50%, -50%); text-align: center; }
        .shirt { width: 55px; height: 55px; background: var(--accent); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.3rem; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .p-info { background: #000; color: #fff; padding: 5px 14px; border-radius: 15px; font-size: 0.8rem; margin-top: 8px; border: 1.5px solid var(--accent); white-space: nowrap; }

        /* --- GRIDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--border); position: relative; backdrop-filter: blur(10px); }
        .card h3 { font-family: 'Orbitron'; color: var(--accent); margin-bottom: 10px; }
        
        .status { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; color: white; }
        .s-done { background: #10b981; } .s-wait { background: #f59e0b; } .s-cancel { background: #ef4444; }

        /* --- ADMIN --- */
        .admin-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #1e293b; background: #0f172a; color: white; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-p { background: var(--accent); }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.03); margin-top: 5px; border-radius: 8px; font-size: 0.8rem; }

        /* --- AUTH --- */
        #auth { position: fixed; inset: 0; background: #020617; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--glass); padding: 40px; border-radius: 25px; width: 90%; max-width: 400px; border: 1px solid var(--accent); text-align: center; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="auth-card">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">ARENA ACCESS</h2>
            <input type="text" id="u-name" placeholder="Kullanıcı Adı">
            <input type="password" id="u-pass" placeholder="Şifre">
            <button class="btn btn-p" onclick="login()">GİRİŞ</button>
            <p style="margin-top:20px; font-size:0.8rem; cursor:pointer; color:#64748b;" onclick="reg()">Hesap Oluştur</p>
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo-box" onclick="go('home')"><img src="logo.png"><span>İMAN POWER</span></div>
            <nav><ul>
                <li><a href="#" class="nav-link active" onclick="go('home')">HOME</a></li>
                <li><a href="#" class="nav-link" onclick="go('kadro')">KADRO</a></li>
                <li><a href="#" class="nav-link" onclick="go('team')">EKİP</a></li>
                <li><a href="#" class="nav-link" onclick="go('tr')">TRANSFER</a></li>
                <li><a href="#" class="nav-link" onclick="go('news')">HABER</a></li>
                <li><a href="#" class="nav-link" onclick="go('adm')">ADMİN</a></li>
            </ul></nav>
        </div>
    </header>

    <section id="home" class="active">
        <div class="hero">
            <h1>Berat Cihad YETEN</h1>
            <p>İman Power Futbol Kulübü Resmi Portalı</p>
        </div>
    </section>

    <section id="kadro">
        <h2 class="title">SAHA <span>DİZİLİMİ</span></h2>
        <div class="pitch" id="pitch-view"></div>
    </section>

    <section id="team">
        <h2 class="title">BİZİM <span>EKİP</span></h2>
        <div id="team-grid" class="grid"></div>
    </section>

    <section id="tr">
        <h2 class="title">TRANSFER <span>MERKEZİ</span></h2>
        <div id="tr-grid" class="grid"></div>
    </section>

    <section id="news">
        <h2 class="title">KULÜP <span>DUYURULARI</span></h2>
        <div id="news-grid" class="grid"></div>
    </section>

    <section id="adm">
        <h2 class="title">YÖNETİM <span>PANELİ</span></h2>
        <div id="adm-auth" class="auth-card" style="margin: 0 auto; border-color: #1e293b;">
            <input type="password" id="adm-key" placeholder="Admin Key">
            <button class="btn btn-p" onclick="checkAdm()">PANELİ AÇ</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <div class="admin-box">
                <div class="card">
                    <h3>EKİP & OYUNCU</h3>
                    <input type="text" id="a-name" placeholder="İsim">
                    <input type="text" id="a-desc" placeholder="Görev (Ekip için)">
                    <button class="btn btn-p" onclick="addTeam()">EKİBE EKLE</button>
                    <hr style="margin:15px 0; opacity:0.1;">
                    <input type="number" id="a-num" placeholder="No">
                    <select id="a-pos"><option value="GK">Kaleci</option><option value="ST">Forvet</option><option value="CM">Orta Saha</option><option value="CB">Stoper</option></select>
                    <button class="btn btn-p" style="background:#8b5cf6" onclick="addPlayer()">KADROYA EKLE</button>
                </div>
                <div class="card">
                    <h3>HABER & TR</h3>
                    <input type="text" id="a-tr" placeholder="Oyuncu Adı">
                    <select id="a-st"><option value="done">BİTTİ</option><option value="wait">SÜRÜYOR</option><option value="cancel">İPTAL</option></select>
                    <button class="btn btn-p" style="background:#f59e0b" onclick="addTr()">TR EKLE</button>
                    <hr style="margin:15px 0; opacity:0.1;">
                    <input type="text" id="a-nt" placeholder="Başlık">
                    <textarea id="a-nb" placeholder="İçerik"></textarea>
                    <button class="btn btn-p" style="background:#3b82f6" onclick="addNews()">HABER EKLE</button>
                </div>
            </div>
            <div class="card" style="margin-top:20px;" id="data-list"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // image_e42f88.png dosyasındaki güncel bilgiler kullanıldı
        const firebaseConfig = {
            apiKey: "AIzaSyDy4ZUv_wZsntWSIDbcOlvpqDTBvWuSdrk",
            authDomain: "imanpowerveri.firebaseapp.com",
            databaseURL: "https://imanpowerveri-default-rtdb.firebaseio.com",
            projectId: "imanpowerveri",
            storageBucket: "imanpowerveri.firebasestorage.app",
            messagingSenderId: "891464029314",
            appId: "1:891464029314:web:581bd3b2ed3d7c6af2d09b",
            measurementId: "G-4T6XSDBDL5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.login = () => {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            onValue(ref(db, 'users/'+n), s => { if(s.val()?.pass === p) document.getElementById('auth').style.display='none'; else alert("Hatalı!"); }, {onlyOnce:true});
        };
        window.reg = () => {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            if(n && p) set(ref(db, 'users/'+n), {pass: p}).then(() => alert("Kayıt Tamam"));
        };

        window.go = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(event.target.classList.contains('nav-link')) event.target.classList.add('active');
        };

        window.checkAdm = () => { if(document.getElementById('adm-key').value === "imanpower2026") { document.getElementById('adm-auth').style.display='none'; document.getElementById('adm-panel').style.display='block'; } };

        window.addTeam = () => push(ref(db, 'ekip'), { name: document.getElementById('a-name').value, desc: document.getElementById('a-desc').value });
        window.addPlayer = () => set(ref(db, 'kadro/'+document.getElementById('a-pos').value), { name: document.getElementById('a-name').value, num: document.getElementById('a-num').value, pos: document.getElementById('a-pos').value });
        window.addTr = () => push(ref(db, 'transfers'), { name: document.getElementById('a-tr').value, st: document.getElementById('a-st').value });
        window.addNews = () => push(ref(db, 'news'), { t: document.getElementById('a-nt').value, b: document.getElementById('a-nb').value, date: new Date().toLocaleDateString() });
        window.rem = (path) => remove(ref(db, path));

        const pPos = { GK:{t:'88%',l:'50%'}, CB:{t:'70%',l:'50%'}, CM:{t:'45%',l:'50%'}, ST:{t:'18%',l:'50%'} };

        onValue(ref(db, '/'), snap => {
            const d = snap.val() || {};
            
            const pView = document.getElementById('pitch-view'); pView.innerHTML = "";
            if(d.kadro) Object.values(d.kadro).forEach(p => {
                pView.innerHTML += `<div class="player" style="top:${pPos[p.pos].t}; left:${pPos[p.pos].l}"><div class="shirt">${p.num}</div><div class="p-info">${p.name}</div></div>`;
            });

            const tGrid = document.getElementById('team-grid'); tGrid.innerHTML = "";
            if(d.ekip) Object.entries(d.ekip).forEach(([id, m]) => {
                tGrid.innerHTML += `<div class="card"><h3>${m.name}</h3><p>${m.desc}</p></div>`;
            });

            const trGrid = document.getElementById('tr-grid'); trGrid.innerHTML = "";
            if(d.transfers) Object.entries(d.transfers).forEach(([id, t]) => {
                const sCls = t.st === 'done' ? 's-done' : (t.st === 'wait' ? 's-wait' : 's-cancel');
                trGrid.innerHTML += `<div class="card"><span class="status ${sCls}">${t.st.toUpperCase()}</span><h3>${t.name}</h3></div>`;
            });

            const nGrid = document.getElementById('news-grid'); nGrid.innerHTML = "";
            if(d.news) Object.values(d.news).forEach(n => {
                nGrid.innerHTML += `<div class="card"><small>${n.date}</small><h3>${n.t}</h3><p>${n.b}</p></div>`;
            });

            const dList = document.getElementById('data-list'); dList.innerHTML = "<h3>VERİ YÖNETİMİ</h3>";
            if(d.ekip) Object.entries(d.ekip).forEach(([id, m]) => dList.innerHTML += `<div class="data-item"><span>Ekip: ${m.name}</span><button onclick="rem('ekip/${id}')">SİL</button></div>`);
            if(d.users) Object.keys(d.users).forEach(u => dList.innerHTML += `<div class="data-item"><span>Üye: ${u}</span><button onclick="rem('users/${u}')">SİL</button></div>`);
        });
    </script>
</body>
</html>
